name: package binaries

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-macos-intel-binary:
    name: macOS Intel binary
    runs-on: macos-15-intel

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up R
        uses: r-lib/actions/setup-r@v2
        with:
          use-public-rspm: true

      - name: Install package dependencies
        uses: r-lib/actions/setup-r-dependencies@v2
        with:
          dependencies: '"hard"'

      - name: Build source package
        shell: bash
        run: R CMD build .

      - name: Build macOS binary package
        shell: bash
        run: |
          PKG=$(ls -1t *.tar.gz | head -n 1)
          R CMD INSTALL --build "$PKG"

      - name: Upload macOS binary artifact
        uses: actions/upload-artifact@v7
        with:
          name: DDIwR-macos-x86_64
          path: "*.tgz"
          archive: false
          if-no-files-found: error
          retention-days: 7

  build-windows-binary:
    name: Windows binary
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up R
        uses: r-lib/actions/setup-r@v2
        with:
          use-public-rspm: true

      - name: Install package dependencies
        uses: r-lib/actions/setup-r-dependencies@v2
        with:
          dependencies: '"hard"'

      - name: Build source package
        shell: bash
        run: R CMD build .

      - name: Build Windows binary package
        shell: bash
        run: |
          PKG=$(ls -1t *.tar.gz | head -n 1)
          R CMD INSTALL --build "$PKG"

      - name: Upload Windows binary artifact
        uses: actions/upload-artifact@v7
        with:
          name: DDIwR-windows-x86_64
          path: "*.zip"
          archive: false
          if-no-files-found: error
          retention-days: 7
